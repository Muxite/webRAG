# Override for local server deployment: nginx on :80 (same origin as API), gateway only on loopback.
# Apply together with the base file (no autoscale; fixed replica count is Compose default):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# Or: python scripts/deploy_local_stack.py up

services:
  gateway:
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      CORS_ALLOWED_ORIGIN_REGEX: "https://.*\\.ts\\.net"

  web:
    image: nginx:alpine
    depends_on:
      - gateway
    ports:
      - "80:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/local-site.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - enet
